<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Bangers&display=swap" rel="stylesheet">
  <style>
    .freedom-font { font-family: 'Bangers', cursive; }
    .flag-flash { animation: flash 1s infinite alternate; }
    @keyframes flash {
      0% { color: #fff; text-shadow: 0 0 10px #fff,0 0 20px #f00; }
      100% { color: #f00; text-shadow: 0 0 20px #fff,0 0 40px #f00; }
    }
  </style>
</head>
<body class="bg-gradient-to-b from-sky-400 to-red-600 min-h-screen flex flex-col items-center justify-center">
  <div class="bg-white bg-opacity-80 p-8 rounded shadow-lg text-center">
    <h1 class="freedom-font text-4xl mb-4">Welcome, {{ username }}{% if is_admin %} (Admin){% endif %}</h1>
    {% if flag %}
      <div class="freedom-font text-5xl flag-flash mt-8">{{ flag }}</div>
    {% endif %}
    <a href="/" class="mt-8 inline-block text-blue-600 underline">Back to Home</a>
  </div>
</body>
</html>
