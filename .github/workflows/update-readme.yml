name: Update README Table of Contents

on:
  workflow_dispatch:  # Manual trigger from the GitHub UI
  pull_request:
    paths:
      - 'challenges/**'
      - '.github/scripts/update_readme.py'  # Optional, if script is updated
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run TOC update script
        run: python .github/scripts/update_readme.py

      - name: Commit updated README
        run: |
          git config user.name "Jacob Elliott"
          git config user.email "jacob@jseis.me"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/jselliott/USCyberOpen2025.git
          git add README.md
          git diff --cached --quiet || git commit -m "Update README TOC"
          git push origin HEAD:${{ github.ref_name }}
